<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token 信息查询</title>
    <link rel="icon" href="logo.png"/>
    <style>
        :root {
            --bg-dark: #121212;
            --bg-card: #1e1e2e;
            --bg-hover: #2a2a3e;
            --bg-input: #252538;
            --border: #3a3a5a;
            --primary: #4f46e5;
            --primary-hover: #6366f1;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text-main: #e4e4e7;
            --text-muted: #a1a1aa;
            --text-dim: #71717a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            padding: 20px;
        }
        .container { max-width: 680px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 30px; font-size: 24px; font-weight: 600; }
        .search-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .input-group { display: flex; gap: 10px; }
        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            background: var(--bg-input);
            color: var(--text-main);
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus { border-color: var(--primary); }
        button {
            padding: 12px 24px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background: var(--primary-hover); }
        button:disabled { background: var(--text-dim); cursor: not-allowed; }
        .result {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 12px;
            display: none;
        }
        .result.show { display: block; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .status-normal { background: rgba(16, 185, 129, 0.15); color: var(--success); }
        .status-pending { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
        .status-expired { background: rgba(239, 68, 68, 0.15); color: var(--danger); }
        .status-disabled { background: rgba(113, 113, 122, 0.15); color: var(--text-dim); }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .info-item { padding: 12px; background: var(--bg-input); border-radius: 8px; }
        .info-label { font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
        .info-value { font-size: 16px; font-weight: bold; color: var(--text-main); }
        .usage-bar { margin-top: 20px; }
        .usage-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .usage-title { font-size: 14px; color: var(--text-muted); }
        .usage-count { font-size: 14px; font-weight: bold; color: var(--text-main); }
        .progress-bar { height: 8px; background: var(--bg-input); border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #059669, var(--success)); border-radius: 4px; transition: width 0.5s; }
        .progress-fill.warning { background: linear-gradient(90deg, #d97706, var(--warning)); }
        .progress-fill.danger { background: linear-gradient(90deg, #dc2626, var(--danger)); }
        .plan-info {
            margin-top: 20px;
            padding: 15px;
            background: rgba(79, 70, 229, 0.1);
            border-radius: 8px;
            border-left: 4px solid var(--primary);
        }
        .plan-title { font-size: 14px; color: var(--primary-hover); font-weight: bold; margin-bottom: 8px; }
        .plan-detail { font-size: 13px; color: var(--text-muted); line-height: 1.6; }

        .stats-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .stat-box { background: var(--bg-input); border-radius: 8px; padding: 14px; text-align: center; }
        .stat-box .num { font-size: 22px; font-weight: 700; color: var(--text-main); }
        .stat-box .lbl { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

        .error { color: var(--danger); text-align: center; padding: 20px; display: none; }
        .error.show { display: block; }
        @media (max-width: 480px) { .info-grid { grid-template-columns: 1fr; } .stats-summary { grid-template-columns: 1fr 1fr; } .input-group { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="container">
        <h1> Token 信息查询</h1>
        <div class="search-box">
            <div class="input-group">
                <input type="text" id="tokenInput" placeholder="请输入您的 Token (sk-...)" />
                <button onclick="queryToken()" id="queryBtn">查询</button>
            </div>
        </div>
        <div class="error" id="errorMsg"></div>
        <div class="result" id="result">
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <div>
                    <span style="font-size:14px;color:var(--text-muted);">Token 名称：</span>
                    <span id="tokenName" style="font-size:16px;font-weight:bold;color:var(--text-main);"></span>
                </div>
                <span id="statusBadge" class="status-badge"></span>
            </div>

            <div class="stats-summary">
                <div class="stat-box">
                    <div class="num" id="totalCalls">0</div>
                    <div class="lbl">累计调用次数</div>
                </div>
                <div class="stat-box">
                    <div class="num" id="totalTokens">0</div>
                    <div class="lbl">累计 Tokens</div>
                </div>
                <div class="stat-box">
                    <div class="num" id="weekCalls">0</div>
                    <div class="lbl">本周调用</div>
                </div>
                <div class="stat-box">
                    <div class="num" id="weekTokens">0</div>
                    <div class="lbl">本周 Tokens</div>
                </div>
            </div>

            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">套餐类型</div>
                    <div class="info-value" id="planType">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">剩余天数</div>
                    <div class="info-value" id="remainingDays">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">激活时间</div>
                    <div class="info-value" id="activatedAt">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">到期时间</div>
                    <div class="info-value" id="expiredAt">-</div>
                </div>
            </div>

            <div class="usage-bar" id="usageBar5h">
                <div class="usage-header">
                    <span class="usage-title">5小时使用量</span>
                    <span class="usage-count" id="usageCount">0 / 0</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
            </div>

            <div class="plan-info">
                <div class="plan-title" id="planTitle">套餐说明</div>
                <div class="plan-detail" id="planDetail"></div>
            </div>
        </div>
    </div>

    <script>
        const statusMap = {
            '正常': 'status-normal',
            '待激活': 'status-pending',
            '已过期': 'status-expired',
            '已禁用': 'status-disabled'
        };

        document.getElementById('tokenInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') queryToken();
        });

        function fmtNum(n) { return (n || 0).toLocaleString('zh-CN'); }

        async function queryToken() {
            const token = document.getElementById('tokenInput').value.trim();
            if (!token) { showError('请输入 Token'); return; }

            const btn = document.getElementById('queryBtn');
            btn.disabled = true;
            btn.textContent = '查询中...';
            hideError();
            document.getElementById('result').classList.remove('show');

            try {
                const resp = await fetch(`/api/v1/token-info?token=${encodeURIComponent(token)}`);
                const data = await resp.json();
                if (!resp.ok) { showError(data.error || '查询失败'); return; }
                renderResult(data);
            } catch (e) {
                showError('网络错误，请稍后重试');
            } finally {
                btn.disabled = false;
                btn.textContent = '查询';
            }
        }

        function renderResult(data) {
            document.getElementById('tokenName').textContent = data.token_name;
            const badge = document.getElementById('statusBadge');
            badge.textContent = data.status;
            badge.className = 'status-badge ' + (statusMap[data.status] || 'status-normal');

            document.getElementById('totalCalls').textContent = fmtNum(data.total_calls || 0);
            document.getElementById('totalTokens').textContent = fmtNum(data.total_tokens || 0);
            document.getElementById('weekCalls').textContent = fmtNum(data.week_calls || 0);
            document.getElementById('weekTokens').textContent = fmtNum(data.week_tokens || 0);

            const planDisplayName = data.plan_name || '';
            document.getElementById('planType').textContent = planDisplayName || (data.plan || '未设置');
            document.getElementById('planTitle').textContent = planDisplayName ? planDisplayName + ' 套餐说明' : '套餐说明';
            document.getElementById('planDetail').textContent = data.plan_desc || '该 Token 未设置限流套餐，无使用量限制。';

            if (data.status === '待激活') {
                document.getElementById('remainingDays').textContent = '待激活';
                document.getElementById('expiredAt').textContent = '激活后30天';
            } else {
                document.getElementById('remainingDays').textContent = data.remaining_days >= 0 ? data.remaining_days + ' 天' : '无限';
                document.getElementById('expiredAt').textContent = data.expired_at;
            }
            document.getElementById('activatedAt').textContent = data.activated_at;

            const limit = data.limit_5h || 0;
            const used = data.used_5h || 0;
            const skipHourly = data.skip_hourly || false;

            const barSection = document.getElementById('usageBar5h');
            const countEl = document.getElementById('usageCount');
            const fill = document.getElementById('progressFill');

            if (skipHourly) {
                countEl.textContent = '不限量（周限 ' + fmtNum(data.weekly_max || 0) + ' 次）';
                fill.style.width = '100%';
                fill.className = 'progress-fill';
            } else if (limit > 0) {
                countEl.textContent = fmtNum(used) + ' / ' + fmtNum(limit);
                const pct = Math.min((used / limit) * 100, 100);
                fill.style.width = pct + '%';
                fill.className = 'progress-fill' + (pct > 80 ? ' danger' : pct > 50 ? ' warning' : '');
            } else {
                barSection.style.display = 'none';
            }

            document.getElementById('result').classList.add('show');
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.classList.add('show');
        }
        function hideError() {
            document.getElementById('errorMsg').classList.remove('show');
        }
    </script>
</body>
</html>
