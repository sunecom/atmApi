<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="expires" content="0">
    <title>atmApi Token 查询</title>
    <link rel="icon" href="logo.png"/>
    <style>
        :root {
            --bg-dark: #121212;
            --bg-card: #1e1e2e;
            --bg-hover: #2a2a3e;
            --bg-input: #252538;
            --border: #3a3a5a;
            --primary: #4f46e5;
            --primary-hover: #6366f1;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text-main: #e4e4e7;
            --text-muted: #a1a1aa;
            --text-dim: #71717a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            font-size: 13px;
            line-height: 1.5;
            padding: 16px;
        }
        .container { max-width: 800px; margin: 0 auto; }

        h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }

        /* 搜索框 */
        .search-box {
            display: flex; gap: 8px; margin-bottom: 20px;
        }
        .search-box input {
            flex: 1; padding: 8px 12px; font-size: 13px;
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 6px; color: var(--text-main); outline: none;
        }
        .search-box input:focus { border-color: var(--primary); }
        .search-box button {
            padding: 8px 20px; font-size: 13px; font-weight: 500;
            background: var(--primary); color: #fff;
            border: none; border-radius: 6px; cursor: pointer;
        }
        .search-box button:hover { background: var(--primary-hover); }

        /* 卡片 */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 16px;
            display: none;
        }
        .card.show { display: block; }
        .card-title { font-size: 14px; font-weight: 600; margin-bottom: 16px; }

        /* 统计行 */
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
        .stat-box {
            background: var(--bg-input); border-radius: 6px;
            padding: 12px; text-align: center;
        }
        .stat-box .num { font-size: 18px; font-weight: 700; }
        .stat-box .lbl { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

        /* 信息网格 */
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
        .info-item {
            background: var(--bg-input); border-radius: 6px; padding: 10px 12px;
        }
        .info-label { font-size: 11px; color: var(--text-dim); margin-bottom: 3px; }
        .info-value { font-size: 13px; font-weight: 600; }

        /* 配额 */
        .quota { margin-bottom: 12px; }
        .quota-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .quota-label { font-size: 12px; color: var(--text-muted); }
        .quota-count { font-size: 12px; font-weight: 600; }
        .quota-count.safe { color: var(--success); }
        .quota-count.warn { color: var(--warning); }
        .quota-count.danger { color: var(--danger); }
        .progress { height: 4px; background: var(--bg-input); border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }
        .progress-fill.safe { background: var(--success); }
        .progress-fill.warn { background: var(--warning); }
        .progress-fill.danger { background: var(--danger); }

        /* Badge */
        .badge { display: inline-block; padding: 2px 8px; font-size: 11px; border-radius: 999px; }
        .badge-success { background: rgba(16,185,129,0.15); color: var(--success); }
        .badge-danger { background: rgba(239,68,68,0.15); color: var(--danger); }
        .badge-warning { background: rgba(245,158,11,0.15); color: var(--warning); }

        /* 续费/升级按钮 */
        .renew-btn {
            width: 100%; padding: 10px;
            background: var(--primary); color: #fff;
            border: none; border-radius: 6px;
            font-size: 13px; font-weight: 600; cursor: pointer;
            margin-top: 12px;
        }
        .renew-btn:hover { background: var(--primary-hover); }
        .renew-btn.pro { background: linear-gradient(135deg, #7c3aed, #6366f1); }
        .renew-btn.premium { background: linear-gradient(135deg, #f59e0b, #ef4444); }
        .upgrade-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px;
        }
        .upgrade-card {
            background: var(--bg-input); border-radius: 6px; padding: 12px;
            cursor: pointer; transition: all 0.2s; text-align: center;
            border: 1px solid var(--border);
        }
        .upgrade-card:hover { border-color: var(--primary); background: var(--bg-hover); }
        .upgrade-card .name { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
        .upgrade-card .price { font-size: 16px; font-weight: 700; color: var(--primary-hover); }
        .upgrade-card .price.premium { color: #f59e0b; }
        .upgrade-card .desc { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

        .error-msg {
            background: var(--bg-card); border: 1px solid var(--danger);
            border-radius: 6px; padding: 16px; text-align: center;
            color: var(--danger); margin-bottom: 16px; display: none;
        }
        .error-msg.show { display: block; }

        @media (max-width: 600px) {
            .stats-row { grid-template-columns: 1fr 1fr; }
            .info-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <h2>🔍 Token 查询</h2>

    <div class="search-box">
        <input type="text" id="tokenInput" placeholder="输入 Token (atm-xxx 或 sk-xxx)"
               onkeypress="if(event.key==='Enter')queryToken()"/>
        <button onclick="queryToken()">查询</button>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="card" id="resultCard">
        <!-- 头部 -->
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <div>
                <span class="dim" style="font-size:11px;color:var(--text-dim);">Token 名称</span><br/>
                <strong id="tokenName" style="font-size:14px;"></strong>
            </div>
            <span id="statusBadge" class="badge"></span>
        </div>

        <!-- 统计 -->
        <div class="stats-row">
            <div class="stat-box">
                <div class="num" id="totalCalls">0</div>
                <div class="lbl">累计调用</div>
            </div>
            <div class="stat-box">
                <div class="num" id="totalTokens">0</div>
                <div class="lbl">累计 Tokens</div>
            </div>
            <div class="stat-box">
                <div class="num" id="weekCalls">0</div>
                <div class="lbl">本周调用</div>
            </div>
            <div class="stat-box">
                <div class="num" id="remainingDays">-</div>
                <div class="lbl">剩余天数</div>
            </div>
        </div>

        <!-- 配额进度条 -->
        <div class="card-title" style="margin-bottom:10px;">配额使用</div>
        <div id="quotaContainer"></div>

        <!-- 详细信息 -->
        <div class="info-grid" style="margin-top:16px;">
            <div class="info-item">
                <div class="info-label">套餐类型</div>
                <div class="info-value" id="planType">-</div>
            </div>
            <div class="info-item">
                <div class="info-label">到期时间</div>
                <div class="info-value" id="expiredAt">-</div>
            </div>
            <div class="info-item">
                <div class="info-label">激活时间</div>
                <div class="info-value" id="activatedAt">-</div>
            </div>
            <div class="info-item">
                <div class="info-label">本周用量</div>
                <div class="info-value" id="weekUsage">-</div>
            </div>
        </div>

        <div id="renewSection" style="display:none;">
            <button class="renew-btn" id="renewBtn" onclick="handleRenew()">续费/延长 30 天</button>
            <div class="dim" style="text-align:center;margin-top:8px;font-size:11px;">续费后有效期在当前到期时间上叠加 30 天</div>

            <div id="upgradeSection" style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border);display:none;">
                <div class="card-title" style="font-size:13px;margin-bottom:8px;">📈 升级套餐</div>
                <div class="upgrade-grid" id="upgradeGrid"></div>
            </div>
        </div>
    </div>
</div>

<script>
const statusMap = {
    'active': {cls:'badge-success', text:'正常'},
    'expired': {cls:'badge-danger', text:'已过期'},
    'disabled': {cls:'badge-warning', text:'已禁用'},
    'waiting': {cls:'badge-warning', text:'待激活'},
    '正常': {cls:'badge-success', text:'正常'},
    '待激活': {cls:'badge-warning', text:'待激活'},
    '已过期': {cls:'badge-danger', text:'已过期'},
    '已禁用': {cls:'badge-warning', text:'已禁用'}
};

function fmt(n) { return (n||0).toLocaleString('zh-CN'); }

async function queryToken() {
    const token = document.getElementById('tokenInput').value.trim();
    if (!token) { showError('请输入 Token'); return; }

    const btn = document.querySelector('.search-box button');
    const oldText = btn.textContent;
    btn.textContent = '查询中...';
    btn.disabled = true;

    document.getElementById('resultCard').classList.remove('show');
    document.getElementById('errorMsg').classList.remove('show');

    try {
        const resp = await fetch(`/api/v1/token-info?token=${encodeURIComponent(token)}`);
        const data = await resp.json();
        if (!resp.ok || data.error) {
            showError(data.error?.message || data.error || '查询失败');
            return;
        }
        renderResult(data, token);
    } catch(e) {
        showError('网络错误');
    } finally {
        btn.textContent = oldText;
        btn.disabled = false;
    }
}

function renderQuota(label, used, limit) {
    if (limit <= 0) return '';
    const pct = Math.min((used/limit)*100, 100);
    const cls = pct > 80 ? 'danger' : pct > 50 ? 'warn' : 'safe';
    return `<div class="quota">
        <div class="quota-header">
            <span class="quota-label">${label}</span>
            <span class="quota-count ${cls}">${fmt(used)} / ${fmt(limit)}(剩余 ${fmt(limit-used)})</span>
        </div>
        <div class="progress"><div class="progress-fill ${cls}" style="width:${pct}%"></div></div>
    </div>`;
}

function renderResult(data, inputToken) {
    document.getElementById('tokenName').textContent = data.token_name || '-';

    const badge = document.getElementById('statusBadge');
    const st = statusMap[data.status] || statusMap['active'];
    badge.textContent = st.text;
    badge.className = 'badge ' + st.cls;

    document.getElementById('totalCalls').textContent = fmt(data.total_calls);
    document.getElementById('totalTokens').textContent = fmt(data.total_tokens);
    document.getElementById('weekCalls').textContent = fmt(data.week_calls);
    document.getElementById('remainingDays').textContent = data.remaining_days >= 0 ? data.remaining_days + '天' : '∞';

    // 配额
    let html = '';
    if (data.is_glm52 && data.points) {
        // GLM-5.2 点数账本
        const p = data.points;
        html += renderQuota('月度点数', p.used_points, p.total_points);
        html += renderQuota('5小时', p.five_hour_used, p.five_hour_points);
        html += renderQuota('今日', p.daily_used, p.daily_points);
        // 显示点数价值
        const remainingPoints = p.total_points - p.used_points;
        const pointValue = (remainingPoints * p.standard_price_per_point).toFixed(2);
        html += `<div class="info-grid" style="margin-top:12px;">
            <div class="info-item">
                <div class="info-label">剩余点数价值</div>
                <div class="info-value">¥${pointValue}</div>
            </div>
            <div class="info-item">
                <div class="info-label">单价</div>
                <div class="info-value">¥${p.standard_price_per_point}/点</div>
            </div>
        </div>`;
    } else {
        // 传统限流模式
        if (data.skip_hourly) {
            html += `<div class="quota"><div class="quota-header"><span class="quota-label">5小时</span><span class="quota-count safe">不限量</span></div></div>`;
        } else {
            html += renderQuota('5小时', data.used_5h||0, data.limit_5h||0);
        }
        html += renderQuota('今日', data.used_daily||0, data.limit_daily||0);
        html += renderQuota('本周', data.used_7d||0, data.weekly_max||0);
        html += renderQuota('本月', data.monthly_used||0, data.monthly_max||0);
    }
    document.getElementById('quotaContainer').innerHTML = html;

    document.getElementById('planType').textContent = data.plan_name || data.plan || '-';
    document.getElementById('expiredAt').textContent = data.expired_at || '-';
    document.getElementById('activatedAt').textContent = data.activated_at || '-';
    document.getElementById('weekUsage').textContent = `${fmt(data.used_7d||0)} / ${fmt(data.weekly_max||0)}`;

    // 续费按钮：始终显示（用户随时可以续费）
    const renew = document.getElementById('renewSection');
    renew.style.display = 'block';
    if (data.status === 'expired' || data.status === '已过期') {
        document.getElementById('renewBtn').textContent = '续费此套餐（已过期）';
    } else if (data.remaining_days >= 0 && data.remaining_days <= 7) {
        document.getElementById('renewBtn').textContent = `续费（剩余 ${data.remaining_days} 天）`;
    } else {
        document.getElementById('renewBtn').textContent = '续费/延长 30 天';
    }

    window._renewKey = inputToken;
    window._renewPlan = data.plan || '';

    // 升级套餐：从数据库动态获取
    const upgradeDiv = document.getElementById('upgradeSection');
    const upgradeGrid = document.getElementById('upgradeGrid');
    
    if (data.all_plans && data.all_plans.length > 0) {
        const curPlan = data.plan || '';
        const curPrice = parseFloat(data.plan_price || 0);
        // 显示价格高于当前套餐的选项（按价格升序）
        const higherPlans = data.all_plans
            .filter(p => p.name !== curPlan && parseFloat(p.price || 0) > curPrice)
            .sort((a, b) => parseFloat(a.price) - parseFloat(b.price))
            .slice(0, 6);
        
        if (higherPlans.length > 0) {
            const priceCls = (price) => {
                const p = parseFloat(price);
                if (p >= 299) return 'premium';
                if (p >= 99) return 'pro';
                return '';
            };
            upgradeGrid.innerHTML = higherPlans.map(p => 
                `<div class="upgrade-card" onclick="handleUpgrade('${p.name}')">` +
                `<div class="name">${p.display_name || p.name}</div>` +
                `<div class="price ${priceCls(p.price)}">¥${p.price}/月</div>` +
                `<div class="desc">5h ${p.hourly_5_max}次 · 月${p.monthly_max}次</div></div>`
            ).join('');
            upgradeDiv.style.display = 'block';
        } else {
            upgradeDiv.style.display = 'none';
        }
    } else {
        upgradeDiv.style.display = 'none';
    }

    document.getElementById('resultCard').classList.add('show');
}

async function handleUpgrade(newPlan) {
    const tokenKey = window._renewKey;
    if (!tokenKey || !newPlan) { showError('信息缺失'); return; }
    try {
        const resp = await fetch('/api/v1/payment/create-order', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({plan: newPlan, user_open_id: tokenKey, renew_token: tokenKey})
        });
        const data = await resp.json();
        if (data.pay_url) {
            window.location.href = data.pay_url;
        } else {
            showError(data.error?.message || '创建订单失败');
        }
    } catch(e) { showError('网络错误'); }
}

async function handleRenew() {
    const tokenKey = window._renewKey;
    const plan = window._renewPlan;
    if (!tokenKey || !plan) { showError('信息缺失'); return; }

    try {
        const resp = await fetch('/api/v1/payment/create-order', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({plan, user_open_id: tokenKey, renew_token: tokenKey})
        });
        const data = await resp.json();
        if (data.pay_url) {
            window.location.href = data.pay_url;
        } else {
            showError(data.error?.message || '创建订单失败');
        }
    } catch(e) { showError('网络错误'); }
}

function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('show');
}

// 自动从 URL 参数读取 token 并查询
(function() {
    const params = new URLSearchParams(window.location.search);
    const tokenFromUrl = params.get('token');
    if (tokenFromUrl) {
        document.getElementById('tokenInput').value = tokenFromUrl;
        queryToken();
    }
})();
</script>

</div>
