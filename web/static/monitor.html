<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="expires" content="0">
    <title>atmApi 监控中心</title>
    <link rel="icon" href="logo.png"/>
    <style>
        :root {
            --bg-dark: #121212;
            --bg-card: #1e1e2e;
            --bg-hover: #2a2a3e;
            --bg-input: #252538;
            --border: #3a3a5a;
            --primary: #4f46e5;
            --primary-hover: #6366f1;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text-main: #e4e4e7;
            --text-muted: #a1a1aa;
            --text-dim: #71717a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            font-size: 13px;
            line-height: 1.5;
            padding: 16px;
        }
        .container { max-width: 1300px; margin: 0 auto; }
        h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
        
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
        .stat-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 8px; padding: 16px;
        }
        .stat-card .label { font-size: 11px; color: var(--text-dim); margin-bottom: 6px; }
        .stat-card .value { font-size: 20px; font-weight: 700; }
        .stat-card .sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
        .stat-card.green .value { color: var(--success); }
        .stat-card.blue .value { color: var(--primary-hover); }
        .stat-card.orange .value { color: var(--warning); }
        .stat-card.red .value { color: var(--danger); }
        
        .card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 8px; padding: 20px; margin-bottom: 20px;
        }
        .card-title { font-size: 14px; font-weight: 600; margin-bottom: 16px; }
        
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
        th { color: var(--text-muted); font-weight: 500; background: var(--bg-hover); }
        tr:hover { background: var(--bg-hover); }
        
        .badge { display: inline-block; padding: 2px 8px; font-size: 11px; border-radius: 999px; }
        .badge-success { background: rgba(16,185,129,0.15); color: var(--success); }
        .badge-danger { background: rgba(239,68,68,0.15); color: var(--danger); }
        
        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .refresh-btn {
            display: inline-block; padding: 6px 14px;
            font-size: 12px; font-weight: 500;
            background: var(--primary); color: #fff;
            border: none; border-radius: 6px; cursor: pointer;
            margin-bottom: 16px;
        }
        .refresh-btn:hover { background: var(--primary-hover); }
        .dim { color: var(--text-dim); font-size: 11px; }
        
        @media (max-width: 768px) { .stats-row { grid-template-columns: 1fr 1fr; } .two-col { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <h2>监控中心</h2>
    <button class="refresh-btn" onclick="loadAll()">刷新数据</button>
    
    <div class="stats-row">
        <div class="stat-card green">
            <div class="label">今日请求</div>
            <div class="value" id="todayCount">-</div>
            <div class="sub" id="todayErrors">-</div>
        </div>
        <div class="stat-card blue">
            <div class="label">累计请求</div>
            <div class="value" id="totalCount">-</div>
            <div class="sub" id="weekInfo">-</div>
        </div>
        <div class="stat-card orange">
            <div class="label">活跃 Token</div>
            <div class="value" id="activeTokens">-</div>
            <div class="sub" id="totalTokenCount">-</div>
        </div>
        <div class="stat-card red">
            <div class="label">错误率</div>
            <div class="value" id="errorRate">-</div>
            <div class="sub" id="avgLatency">-</div>
        </div>
    </div>
    
    <div class="two-col">
        <div class="card">
            <div class="card-title">模型调用统计</div>
            <table>
                <thead><tr><th>模型</th><th>调用次数</th><th>Tokens</th></tr></thead>
                <tbody id="modelTable"><tr><td colspan="3" class="dim" style="text-align:center;">加载中...</td></tr></tbody>
            </table>
        </div>
        <div class="card">
            <div class="card-title">近7天趋势</div>
            <table>
                <thead><tr><th>日期</th><th>请求数</th><th>错误</th></tr></thead>
                <tbody id="dailyTable"><tr><td colspan="3" class="dim" style="text-align:center;">加载中...</td></tr></tbody>
            </table>
        </div>
    </div>
    
    <div class="card">
        <div class="card-title">最近请求（最新 20 条）</div>
        <table>
            <thead><tr><th>时间</th><th>Token</th><th>实际模型</th><th>渠道</th><th>状态</th><th>耗时</th></tr></thead>
            <tbody id="recentTable"><tr><td colspan="6" class="dim" style="text-align:center;">加载中...</td></tr></tbody>
        </table>
    </div>
</div>

<script>
async function loadAll() {
    try {
        const r = await fetch('/api/v1/stats');
        const json = await r.json();
        if (!json || !json.data) return;
        const d = json.data;
        
        document.getElementById('todayCount').textContent = (d.today_count||0).toLocaleString();
        document.getElementById('todayErrors').textContent = (d.today_errors||0) + ' 错误';
        document.getElementById('totalCount').textContent = (d.total_requests||0).toLocaleString();
        document.getElementById('weekInfo').textContent = '累计 ' + (d.total_requests||0).toLocaleString();
        document.getElementById('activeTokens').textContent = (d.active_tokens||0);
        document.getElementById('totalTokenCount').textContent = '共 ' + (d.total_tokens||0) + ' 个';
        
        const errRate = d.total_requests > 0 ? ((d.total_errors/d.total_requests)*100).toFixed(1) : '0';
        document.getElementById('errorRate').textContent = errRate + '%';
        document.getElementById('avgLatency').textContent = (d.avg_duration||0) + 'ms 平均';
        
        // 模型统计
        const models = d.by_model || [];
        document.getElementById('modelTable').innerHTML = models.length ? models.map(m => 
            `<tr><td>${m.model||'-'}</td><td>${(m.count||0).toLocaleString()}</td><td>${(m.total_tokens||0).toLocaleString()}</td></tr>`
        ).join('') : '<tr><td colspan="3" class="dim" style="text-align:center;">暂无数据</td></tr>';
        
        // 每日趋势
        const daily = d.daily || [];
        document.getElementById('dailyTable').innerHTML = daily.length ? daily.map(d => 
            `<tr><td>${d.date||'-'}</td><td>${(d.count||0).toLocaleString()}</td><td><span class="${d.errors>0?'badge badge-danger':''}">${d.errors||0}</span></td></tr>`
        ).join('') : '<tr><td colspan="3" class="dim" style="text-align:center;">暂无数据</td></tr>';
        
        // 最近请求
        const recent = d.recent || [];
        document.getElementById('recentTable').innerHTML = recent.length ? recent.map(r => {
            const time = (r.created_at||'').substring(5,19);
            const cls = r.status_code >= 400 ? 'badge badge-danger' : 'badge badge-success';
            // 模型显示：flash 绿色，pro 橙色
            let modelLabel = r.routed_model || r.model || '-';
            if (modelLabel.includes('flash')) modelLabel = '<span class="badge badge-success" style="background:#27ae60">⚡ flash</span>';
            else if (modelLabel.includes('pro')) modelLabel = '<span class="badge badge-warning" style="background:#e67e22">🧠 pro</span>';
            else if (modelLabel.includes('qwen')) modelLabel = '<span class="badge badge-info" style="background:#3498db">🖼 qwen</span>';
            return `<tr><td>${time}</td><td>${r.token_name||'-'}</td><td>${modelLabel}</td><td>${r.channel_name||'-'}</td><td><span class="${cls}">${r.status_code}</span></td><td>${r.duration_ms||0}ms</td></tr>`;
        }).join('') : '<tr><td colspan="6" class="dim" style="text-align:center;">暂无数据</td></tr>';
        
    } catch(e) {
        console.error('load error:', e);
    }
}

loadAll();
setInterval(loadAll, 30000);
</script>

<div style="text-align:center;margin-top:24px;padding-top:20px;border-top:1px solid var(--border);font-size:11px;color:var(--text-dim);">
    🦐 <a href="https://www.aitomoney.online" target="_blank" style="color:var(--text-main);text-decoration:none;">AiToMoney</a> 出品 · 一个人可以走得很快，一群虾可以折腾得更远
</div>
</body>
</html>
