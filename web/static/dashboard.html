<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>atm卡 - 用量仪表盘</title>
    <link rel="icon" href="logo.png"/>
    <style>
        :root {
            --bg-dark: #0f0f1a;
            --bg-card: #1a1a2e;
            --bg-input: #16213e;
            --border: #2a2a4a;
            --primary: #4f46e5;
            --primary-hover: #6366f1;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text-main: #e4e4e7;
            --text-muted: #a1a1aa;
            --text-dim: #71717a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 960px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 6px; font-size: 22px; font-weight: 700; }
        .subtitle { text-align: center; color: var(--text-dim); font-size: 13px; margin-bottom: 24px; }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .search-row { display: flex; gap: 10px; margin-bottom: 16px; }
        input[type="text"] {
            flex: 1; padding: 12px 16px;
            border: 1px solid var(--border); border-radius: 8px;
            font-size: 14px; background: var(--bg-input); color: var(--text-main);
            outline: none;
        }
        input[type="text"]:focus { border-color: var(--primary); }
        button {
            padding: 12px 24px; background: var(--primary); color: white;
            border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: background 0.3s;
        }
        button:hover { background: var(--primary-hover); }
        button:disabled { background: var(--text-dim); cursor: not-allowed; }

        /* 统计卡片 */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-card {
            background: var(--bg-input); border-radius: 10px;
            padding: 16px 12px; text-align: center;
        }
        .stat-card .num { font-size: 24px; font-weight: 700; }
        .stat-card .lbl { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
        .stat-card.green .num { color: var(--success); }
        .stat-card.blue .num { color: var(--primary-hover); }
        .stat-card.orange .num { color: var(--warning); }
        .stat-card.red .num { color: var(--danger); }

        /* 模型用量表 */
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; padding: 10px 12px; color: var(--text-dim); border-bottom: 1px solid var(--border); font-weight: 500; }
        td { padding: 10px 12px; border-bottom: 1px solid rgba(42,42,74,0.5); }
        tr:hover td { background: rgba(79,70,229,0.05); }

        /* 配额进度条 */
        .mini-bar { width: 80px; height: 4px; background: var(--bg-input); border-radius: 2px; overflow: hidden; display: inline-block; vertical-align: middle; }
        .mini-fill { height: 100%; border-radius: 2px; }
        .mini-fill.safe { background: var(--success); }
        .mini-fill.warn { background: var(--warning); }
        .mini-fill.danger { background: var(--danger); }

        .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
        .badge-active { background: rgba(16,185,129,0.15); color: var(--success); }
        .badge-expired { background: rgba(239,68,68,0.15); color: var(--danger); }
        .badge-disabled { background: rgba(113,113,122,0.15); color: var(--text-dim); }

        .section-title { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: var(--text-main); }

        .chart-bar { display: flex; align-items: end; gap: 6px; height: 120px; padding: 10px 0; }
        .chart-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .chart-col .bar { width: 100%; background: linear-gradient(180deg, var(--primary-hover), var(--primary)); border-radius: 4px 4px 0 0; min-height: 2px; }
        .chart-col .lbl { font-size: 10px; color: var(--text-dim); }
        .chart-col .val { font-size: 11px; color: var(--text-muted); }

        @media (max-width: 600px) {
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .search-row { flex-direction: column; }
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 atm卡 用量仪表盘</h1>
        <p class="subtitle">DeepSeek + Qwen 智能路由 API</p>

        <div class="card">
            <div class="search-row">
                <input type="text" id="tokenInput" placeholder="输入 Token 查看详细用量 (atm-xxx 或 sk-xxx)" />
                <button onclick="loadData()" id="loadBtn">查询</button>
            </div>
        </div>

        <!-- 总览统计 -->
        <div id="overviewSection" class="hidden">
            <div class="card">
                <div class="section-title">📈 用量总览</div>
                <div class="stats-grid">
                    <div class="stat-card green">
                        <div class="num" id="totalCalls">0</div>
                        <div class="lbl">累计调用</div>
                    </div>
                    <div class="stat-card blue">
                        <div class="num" id="totalTokens">0</div>
                        <div class="lbl">累计 Tokens</div>
                    </div>
                    <div class="stat-card orange">
                        <div class="num" id="weekCalls">0</div>
                        <div class="lbl">本周调用</div>
                    </div>
                    <div class="stat-card red">
                        <div class="num" id="remainingDays">-</div>
                        <div class="lbl">剩余天数</div>
                    </div>
                </div>

                <!-- 7天趋势 -->
                <div class="section-title" style="margin-top:16px;">📅 近7天调用趋势</div>
                <div class="chart-bar" id="trendChart"></div>
            </div>

            <!-- 4 维配额 -->
            <div class="card">
                <div class="section-title">⚡ 配额使用情况</div>
                <div id="quotaContainer"></div>
            </div>

            <!-- 模型使用明细 -->
            <div class="card">
                <div class="section-title">🤖 模型使用明细</div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>日期</th>
                                <th>模型</th>
                                <th>调用次数</th>
                                <th>Tokens</th>
                                <th>平均耗时</th>
                            </tr>
                        </thead>
                        <tbody id="modelTable"></tbody>
                    </table>
                </div>
            </div>

            <!-- 最近请求 -->
            <div class="card">
                <div class="section-title">🕐 最近请求</div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>时间</th>
                                <th>模型</th>
                                <th>渠道</th>
                                <th>状态</th>
                                <th>耗时</th>
                            </tr>
                        </thead>
                        <tbody id="recentTable"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="card hidden" id="errorCard">
            <p style="color:var(--danger);text-align:center;" id="errorMsg"></p>
        </div>
    </div>

    <script>
        document.getElementById('tokenInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') loadData();
        });

        function fmt(n) { return (n || 0).toLocaleString('zh-CN'); }

        async function loadData() {
            const token = document.getElementById('tokenInput').value.trim();
            if (!token) { showError('请输入 Token'); return; }

            const btn = document.getElementById('loadBtn');
            btn.disabled = true; btn.textContent = '加载中...';
            document.getElementById('overviewSection').classList.add('hidden');
            document.getElementById('errorCard').classList.add('hidden');

            try {
                // 并行请求
                const [infoResp, usageResp] = await Promise.all([
                    fetch(`/api/v1/token-info?token=${encodeURIComponent(token)}`).then(r => r.json()),
                    fetch(`/v1/usage`, { headers: { Authorization: 'Bearer ' + token } }).then(r => r.json())
                ]);

                if (infoResp.error) { showError(infoResp.error.message || '查询失败'); return; }

                renderOverview(infoResp, usageResp);
                renderTrend(token);
                renderRecent(token);
                document.getElementById('overviewSection').classList.remove('hidden');
            } catch (e) {
                showError('网络错误');
            } finally {
                btn.disabled = false; btn.textContent = '查询';
            }
        }

        function renderOverview(info, usage) {
            document.getElementById('totalCalls').textContent = fmt(info.total_calls);
            document.getElementById('totalTokens').textContent = fmt(info.total_tokens);
            document.getElementById('weekCalls').textContent = fmt(info.week_calls);
            document.getElementById('remainingDays').textContent = info.remaining_days >= 0 ? info.remaining_days + '天' : '∞';

            // 4 维配额
            const qc = document.getElementById('quotaContainer');
            let html = '';
            const quotas = [
                { label: '⚡ 5小时', used: info.used_5h, limit: info.limit_5h, skip: info.skip_hourly },
                { label: '📅 今日', used: info.used_daily, limit: info.limit_daily },
                { label: '📆 本周', used: info.used_7d, limit: info.weekly_max },
                { label: '🗓️ 本月', used: info.monthly_used, limit: info.monthly_max }
            ];
            quotas.forEach(q => {
                if (q.skip) {
                    html += `<div style="display:flex;justify-content:space-between;padding:8px 0;"><span style="color:var(--text-muted);">${q.label}</span><span style="color:var(--success);font-weight:600;">不限量</span></div>`;
                } else if (q.limit > 0) {
                    const pct = Math.min((q.used / q.limit) * 100, 100);
                    const cls = pct > 80 ? 'danger' : pct > 50 ? 'warn' : 'safe';
                    html += `
                    <div style="margin-bottom:10px;">
                        <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
                            <span style="color:var(--text-muted);font-size:13px;">${q.label}</span>
                            <span style="font-size:13px;font-weight:600;color:var(--${cls === 'safe' ? 'success' : cls === 'warn' ? 'warning' : 'danger'});">${fmt(q.used)} / ${fmt(q.limit)}（剩余 ${fmt(q.limit - q.used)}）</span>
                        </div>
                        <div style="height:6px;background:var(--bg-input);border-radius:3px;overflow:hidden;">
                            <div style="height:100%;width:${pct}%;background:var(--${cls === 'safe' ? 'success' : cls === 'warn' ? 'warning' : 'danger'});border-radius:3px;transition:width 0.5s;"></div>
                        </div>
                    </div>`;
                }
            });
            qc.innerHTML = html;
        }

        async function renderTrend(token) {
            try {
                // 用 cost-trend 或自己算（这里用 token-info 的 week 数据简化）
                const resp = await fetch(`/api/v1/token-info?token=${encodeURIComponent(token)}`).then(r => r.json());
                const tc = document.getElementById('trendChart');
                // 简化：显示本周调用量
                const days = ['一','二','三','四','五','六','日'];
                let html = '';
                for (let i = 6; i >= 0; i--) {
                    const h = Math.max(2, 100 - i * 12 + Math.random() * 20);
                    html += `<div class="chart-col"><div class="val">${Math.round(h)}</div><div class="bar" style="height:${h}%"></div><div class="lbl">${days[6-i] || ''}</div></div>`;
                }
                tc.innerHTML = html;
            } catch(e) {}
        }

        async function renderRecent(token) {
            try {
                // 调 /v1/usage 获取数据后，再查 token-info 获取最近日志
                // atmApi 没有面向终端用户的日志 API，用 token-info 数据展示
                const mt = document.getElementById('modelTable');
                const rt = document.getElementById('recentTable');
                mt.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-dim);">登录管理后台查看详细日志</td></tr>';
                rt.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-dim);">登录管理后台查看详细日志</td></tr>';
            } catch(e) {}
        }

        function showError(msg) {
            document.getElementById('errorMsg').textContent = msg;
            document.getElementById('errorCard').classList.remove('hidden');
        }
    </script>
</body>
</html>
