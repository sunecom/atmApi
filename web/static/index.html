<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>atmApi 控制台</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      background: #0b1020;
      color: #e6edf3;
    }
    .wrap { max-width: 1080px; margin: 0 auto; padding: 32px 20px 60px; }
    .hero {
      background: linear-gradient(135deg, #11182d, #17213d);
      border: 1px solid #2c3a63;
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 12px 40px rgba(0,0,0,.25);
    }
    h1 { margin: 0 0 10px; font-size: 32px; }
    .sub { color: #9fb0d1; line-height: 1.6; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-top: 20px; }
    .card {
      background: #11182d;
      border: 1px solid #2c3a63;
      border-radius: 16px;
      padding: 18px;
    }
    .card h3 { margin: 0 0 12px; font-size: 18px; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; margin: 10px 0; }
    input, textarea, select {
      width: 100%; box-sizing: border-box; padding: 10px 12px; border-radius: 10px;
      border: 1px solid #34456f; background: #0d1426; color: #e6edf3;
    }
    textarea { min-height: 110px; resize: vertical; }
    button {
      background: #3b82f6; color: white; border: none; padding: 10px 14px; border-radius: 10px;
      cursor: pointer; font-weight: 600;
    }
    button.secondary { background: #334155; }
    button:hover { opacity: .92; }
    pre {
      white-space: pre-wrap; word-break: break-word; background: #0a1120; border: 1px solid #233253;
      border-radius: 12px; padding: 14px; min-height: 100px; color: #cfe3ff;
      overflow: auto;
    }
    .ok { color: #22c55e; }
    .warn { color: #f59e0b; }
    .small { font-size: 13px; color: #94a3b8; }
    .pill {
      display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 12px;
      background: rgba(59,130,246,.15); color: #93c5fd; border: 1px solid rgba(59,130,246,.25);
    }
    a { color: #93c5fd; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <span class="pill">ATM API · MVP 控制台</span>
      <h1>atmApi 已启动</h1>
      <div class="sub">
        这是一个用于测试 <b>用户 / Token / 渠道 / 模型路由 / 自动 fallback</b> 的最小控制台。<br/>
        如果你能打开这个页面，说明 <span class="ok">服务、端口、外网访问</span> 都已经正常。
      </div>
      <div class="row" style="margin-top:16px;">
        <a href="/health" target="_blank"><button>打开 /health</button></a>
        <a href="/api/v1/models" target="_blank"><button class="secondary">打开 /api/v1/models</button></a>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <h3>1. 健康检查</h3>
        <div class="small">验证服务是否在线</div>
        <div class="row"><button onclick="checkHealth()">检查 /health</button></div>
        <pre id="healthOut">点击按钮开始测试…</pre>
      </div>

      <div class="card">
        <h3>2. 模型列表</h3>
        <div class="small">查看当前聚合出的可用模型</div>
        <div class="row"><button onclick="loadModels()">获取 /api/v1/models</button></div>
        <pre id="modelsOut">点击按钮开始测试…</pre>
      </div>

      <div class="card">
        <h3>3. Token 测试</h3>
        <div class="small">填入 Token 后，可直接测试 chat/completions</div>
        <input id="token" placeholder="输入 Bearer Token，例如 atm-xxxx" />
        <div class="row">
          <input id="model" value="qwen3.5-plus" placeholder="模型名，例如 qwen3.5-plus" />
        </div>
        <textarea id="prompt">回复 OK，并说明当前实际使用了哪个模型。</textarea>
        <div class="row">
          <button onclick="testChat()">测试 chat/completions</button>
        </div>
        <pre id="chatOut">填入 Token 后点击测试…</pre>
      </div>
    </div>
  </div>

  <script>
    async function show(id, data) {
      document.getElementById(id).textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
    }

    async function safeJson(res) {
      const text = await res.text();
      try { return JSON.parse(text); } catch { return text; }
    }

    async function checkHealth() {
      const res = await fetch('/health');
      show('healthOut', await safeJson(res));
    }

    async function loadModels() {
      const res = await fetch('/api/v1/models');
      show('modelsOut', await safeJson(res));
    }

    async function testChat() {
      const token = document.getElementById('token').value.trim();
      const model = document.getElementById('model').value.trim();
      const prompt = document.getElementById('prompt').value.trim();
      if (!token) {
        show('chatOut', '请先输入 Token');
        return;
      }
      const res = await fetch('/api/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token,
        },
        body: JSON.stringify({
          model,
          messages: [{ role: 'user', content: prompt }],
          max_tokens: 128,
        })
      });
      show('chatOut', await safeJson(res));
    }
  </script>
</body>
</html>
