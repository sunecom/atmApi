version: '3.8'

services:
  atmapi:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    environment:
      - PORT=3000
      - DB_TYPE=sqlite
      - DB_PATH=/app/data/atmapi.db
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
