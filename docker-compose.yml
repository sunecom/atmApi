version: '3.8'

services:
  atmapi:
    build: .
    ports:
      - "3002:3002"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=3002
      - DB_TYPE=sqlite
      - DB_PATH=/app/data/atmapi.db
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 30s
      timeout: 3s
      retries: 3
