# atmApi HAProxy 负载均衡配置
global
    log /dev/log local0
    maxconn 4096

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5000ms
    timeout client  50000ms
    timeout server  50000ms

frontend atmapi_frontend
    bind *:80
    default_backend atmapi_backend

backend atmapi_backend
    balance roundrobin
    option httpchk GET /health
    server atmapi1 127.0.0.1:3002 check
    # server atmapi2 192.168.1.2:3002 check  # 可添加更多实例
